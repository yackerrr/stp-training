name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage site and bump cache version to commit SHA
        run: |
          mkdir -p _site
          cp index.html manifest.json sw.js _site/
          cp icon-192.png icon-512.png stp-logo.png _site/
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s|const CACHE_NAME = 'stp-training-[^']*'|const CACHE_NAME = 'stp-training-${SHORT_SHA}'|" _site/sw.js
          echo "Cache version pinned to:"
          grep CACHE_NAME _site/sw.js | head -1

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - uses: actions/deploy-pages@v4
        id: deployment
